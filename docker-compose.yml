version: "3.9"

services:
  ids:
    build: .
    network_mode: host          # required for raw packet capture
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./ids_alerts.log:/app/ids_alerts.log
      - ./model:/app/model
    restart: unless-stopped
    command: python -m ids.intrusion --interface eth0

  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./ids_alerts.log:/app/ids_alerts.log
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - ids
